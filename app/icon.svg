<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" role="img" aria-label="Darna">
  <title>Darna</title>
  <!-- Fond plein (full-bleed) : l'OS/manifest applique le masque/arrondi. -->
  <rect width="100" height="100" fill="#3B6944"/>
  <!-- Keyline communauté (cercle sage léger) -->
  <circle cx="50" cy="54" r="33" fill="none" stroke="#5B9C66" stroke-width="1.4" opacity="0.55"/>
  <!-- Façade du riad (crème) -->
  <rect x="33" y="33" width="34" height="47" rx="3" fill="#F3EFE2"/>
  <!-- Toit en tuiles vertes -->
  <path d="M29 33 L50 22 L71 33 Z" fill="#4A8255"/>
  <rect x="29" y="31.5" width="42" height="3.2" rx="1.6" fill="#5B9C66"/>
  <!-- Porte en fer à cheval (arche marocaine) — cadre crème -->
  <path d="M40 80 L40 56 C40 50 42.5 46.5 45.5 45 L50 41 L54.5 45 C57.5 46.5 60 50 60 56 L60 80 Z" fill="#E9E2CF"/>
  <!-- Battant intérieur vert profond -->
  <path d="M42 80 L42 56.5 C42 51.5 44 48.5 46.5 47 L50 43.6 L53.5 47 C56 48.5 58 51.5 58 56.5 L58 80 Z" fill="#2F5E3A"/>
  <!-- Refend des deux battants -->
  <line x1="50" y1="47" x2="50" y2="80" stroke="#E9E2CF" stroke-width="0.9" opacity="0.55"/>
  <!-- Heurtoirs dorés -->
  <circle cx="47" cy="66" r="1" fill="#D4A24A"/>
  <circle cx="53" cy="66" r="1" fill="#D4A24A"/>
</svg>
