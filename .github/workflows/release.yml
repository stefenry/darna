name: Release

on:
  push:
    tags:
      - 'release-*'

permissions:
  contents: read

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version-file: '.nvmrc'

      - run: corepack enable

      - uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: ~/.local/share/pnpm/store
          key: pnpm-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: pnpm-${{ runner.os }}-

      - run: pnpm install --frozen-lockfile

      - name: Build with sourcemaps
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY }}
        run: pnpm build

      - name: Apply database migrations
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
        run: npx supabase@latest db push --linked --project-ref "$SUPABASE_PROJECT_REF"

      - name: Resolve deployment ID for tag commit
        id: deployment
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          SHA=$(git rev-parse HEAD)
          for i in $(seq 1 20); do
            DEPLOYMENT_ID=$(curl -s -H "Authorization: Bearer $VERCEL_TOKEN" \
              "https://api.vercel.com/v13/deployments?projectId=$VERCEL_PROJECT_ID&state=READY&meta.githubCommitSha=$SHA&limit=1" \
              | jq -r '.deployments[0].uid // empty')
            if [ -n "$DEPLOYMENT_ID" ]; then
              echo "deployment_id=$DEPLOYMENT_ID" >> "$GITHUB_OUTPUT"
              echo "Found deployment: $DEPLOYMENT_ID"
              exit 0
            fi
            echo "Waiting for deployment... ($i/20)"
            sleep 15
          done
          echo "::warning::No deployment found for $SHA, promoting latest"

      - name: Promote to production
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
        run: |
          ARGS="--yes --token $VERCEL_TOKEN --scope $VERCEL_ORG_ID"
          if [ -n "${{ steps.deployment.outputs.deployment_id }}" ]; then
            npx vercel@latest promote "${{ steps.deployment.outputs.deployment_id }}" $ARGS
          else
            npx vercel@latest promote $ARGS
          fi
