name: CI

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: read

jobs:
  lint-typecheck-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version-file: '.nvmrc'

      - run: corepack enable

      - uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: ~/.local/share/pnpm/store
          key: pnpm-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: pnpm-${{ runner.os }}-

      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test

  lighthouse:
    needs: lint-typecheck-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version-file: '.nvmrc'

      - run: corepack enable

      - uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: ~/.local/share/pnpm/store
          key: pnpm-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: pnpm-${{ runner.os }}-

      - run: pnpm install --frozen-lockfile

      - name: Wait for Vercel preview deployment
        id: vercel-preview
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          # Projet détenu par une team : sans teamId, l'API liste le scope
          # personnel → 0 déploiement et timeout silencieux (state= vide).
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          PR_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          if [ -z "$VERCEL_TOKEN" ] || [ -z "$VERCEL_PROJECT_ID" ]; then
            echo "VERCEL_TOKEN or VERCEL_PROJECT_ID not set, skipping Lighthouse"
            exit 0
          fi
          TEAM_QS=""
          if [ -n "$VERCEL_ORG_ID" ]; then TEAM_QS="&teamId=$VERCEL_ORG_ID"; fi
          for i in $(seq 1 20); do
            # v7 = version courante de list-deployments (v13 → « Invalid API
            # version ») ; `sha` est un filtre natif de l'endpoint.
            RESPONSE=$(curl -s -H "Authorization: Bearer $VERCEL_TOKEN" \
              "https://api.vercel.com/v7/deployments?projectId=$VERCEL_PROJECT_ID&sha=$PR_SHA&limit=1$TEAM_QS")
            STATE=$(echo "$RESPONSE" | jq -r '.deployments[0].state // empty')
            # Diagnostic : sans ça, une erreur API (token/scope/param) est
            # indistinguable d'un déploiement pas encore listé.
            API_ERR=$(echo "$RESPONSE" | jq -r '.error.message // empty')
            if [ -n "$API_ERR" ]; then echo "Vercel API error: $API_ERR"; fi
            if [ "$STATE" = "READY" ]; then
              URL=$(echo "$RESPONSE" | jq -r '.deployments[0].url // empty')
              echo "preview_url=https://$URL" >> "$GITHUB_OUTPUT"
              echo "Preview ready: https://$URL"
              exit 0
            fi
            if [ "$STATE" = "ERROR" ]; then
              echo "Vercel preview deployment failed"
              exit 1
            fi
            echo "Waiting for preview deployment (state=$STATE)... ($i/20)"
            sleep 15
          done
          echo "Timeout waiting for Vercel preview"
          exit 1

      - name: Run Lighthouse CI
        # Sans secrets Vercel, l'étape précédente sort en « skip » sans poser
        # preview_url — ne pas lancer lhci avec une URL vide (staticDistDir error).
        if: steps.vercel-preview.outputs.preview_url != ''
        env:
          LHCI_BUILD_CONTEXT__CURRENT_HASH: ${{ github.event.pull_request.head.sha }}
        run: |
          npx @lhci/cli@0.15 autorun \
            --collect.url="${{ steps.vercel-preview.outputs.preview_url }}"

  # Story 1.10c (AR32) — Tests d'isolation RLS sur la stack Supabase locale.
  # BLOQUANT : toute fuite cross-user / cross-résidence échoue le merge.
  e2e-rls:
    needs: lint-typecheck-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version-file: '.nvmrc'

      - run: corepack enable

      - uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: ~/.local/share/pnpm/store
          key: pnpm-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: pnpm-${{ runner.os }}-

      - run: pnpm install --frozen-lockfile

      - uses: supabase/setup-cli@v1 # TODO: pin to full commit SHA for supply-chain hardening
        with:
          version: 2.109.1 # pinned — do not use 'latest'; bump intentionally

      - name: Start Supabase local stack
        run: supabase start

      - name: Run RLS isolation tests
        run: |
          STATUS=$(supabase status -o json)
          # CLI v1 uses uppercase keys, v2 uses lowercase — handle both.
          SUPABASE_LOCAL_URL=$(echo "$STATUS" | jq -r '.API_URL // .api_url // empty')
          SUPABASE_LOCAL_SERVICE_KEY=$(echo "$STATUS" | jq -r '.SERVICE_ROLE_KEY // .service_role_key // empty')
          SUPABASE_LOCAL_PUBLISHABLE_KEY=$(echo "$STATUS" | jq -r '.ANON_KEY // .anon_key // empty')
          if [ -z "$SUPABASE_LOCAL_URL" ] || [ -z "$SUPABASE_LOCAL_SERVICE_KEY" ] || [ -z "$SUPABASE_LOCAL_PUBLISHABLE_KEY" ]; then
            echo "ERROR: failed to extract Supabase credentials from 'supabase status -o json'" >&2
            echo "$STATUS" >&2
            exit 1
          fi
          export SUPABASE_LOCAL_URL SUPABASE_LOCAL_SERVICE_KEY SUPABASE_LOCAL_PUBLISHABLE_KEY
          SUPABASE_LOCAL_TEST=true pnpm vitest run tests/rls.test.ts

  # Story 1.10c (AR33) — Scan a11y axe sur les pages publiques.
  # NON-BLOQUANT au MVP (continue-on-error) ; deviendra bloquant avant la bêta.
  a11y:
    needs: lint-typecheck-test
    runs-on: ubuntu-latest
    continue-on-error: true
    env:
      NEXT_PUBLIC_SITE_URL: http://localhost:3000
      NEXT_PUBLIC_SUPABASE_URL: http://localhost:54321
      NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: sb_publishable_ci_stub
      SUPABASE_SECRET_KEY: sb_secret_ci_stub
      BREVO_API_KEY: xkeysib-ci-stub
      BREVO_SENDER_EMAIL: noreply@darna.local
      GLITCHTIP_DSN: https://stub@glitchtip.local/1
      UPSTASH_REDIS_REST_URL: http://localhost:8079
      UPSTASH_REDIS_REST_TOKEN: tok_stub
      CRON_SECRET: aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa
      CONSENT_TOKEN_SECRET: cccccccccccccccccccccccccccccccccccccccc
      PSEUDONYM_SECRET: pppppppppppppppppppppppppppppppppppppppp
      # `next build` tourne en NODE_ENV=production → SMS_PROVIDER=log est
      # interdit (lib/env.ts P4). Stub brevo, aucun SMS réel envoyé par le scan.
      SMS_PROVIDER: brevo
      BREVO_SMS_SENDER: DarnaCI
      LEGAL_CONTACT_EMAIL: legal@darna.local
      INITIAL_COMOD_EMAILS: co1@darna.local,co2@darna.local
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version-file: '.nvmrc'

      - run: corepack enable

      - uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: ~/.local/share/pnpm/store
          key: pnpm-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: pnpm-${{ runner.os }}-

      - run: pnpm install --frozen-lockfile
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm build
      - name: Start app + run axe a11y scan
        run: |
          pnpm start &
          pnpm exec wait-on http://localhost:3000/fr --timeout 60000
          pnpm exec playwright test --project=chromium e2e/a11y.spec.ts
